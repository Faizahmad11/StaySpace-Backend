name: StaySpace Firebase Preview Deployment

on: pull_request

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout StaySpace Code
        uses: actions/checkout@v3

      - name: Install Dependencies & Build StaySpace
        run: npm install && CI= npm run build

      - name: Deploy StaySpace Preview to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TESTING_PRODUCTION_5EF52 }}
          projectId: testing-production-5ef52
